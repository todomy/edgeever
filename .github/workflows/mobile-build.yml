name: Build EdgeEver Mobile

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/mobile/**"
      - "packages/client/**"
      - "packages/shared/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/mobile-build.yml"

permissions:
  contents: read

concurrency:
  group: edgeever-mobile-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Build Android packages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check Expo dependencies
        run: bun --cwd apps/mobile expo install --check

      - name: Typecheck
        run: bun run typecheck:mobile

      - name: Generate Android native project
        run: bunx expo prebuild --platform android --non-interactive --clean
        working-directory: apps/mobile

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: apps/mobile/android

      - name: Restore Android upload keystore
        if: github.event_name == 'workflow_dispatch'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > edgeever-upload.p12
          chmod 600 edgeever-upload.p12
        working-directory: apps/mobile/android

      - name: Build signed release AAB
        if: github.event_name == 'workflow_dispatch'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$PWD/edgeever-upload.p12" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD" \
            -Pandroid.injected.signing.store.type=PKCS12
        working-directory: apps/mobile/android

      - name: Verify release AAB signature
        if: github.event_name == 'workflow_dispatch'
        run: jarsigner -verify app/build/outputs/bundle/release/*.aab
        working-directory: apps/mobile/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: edgeever-android-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release AAB
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: edgeever-android-release-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
